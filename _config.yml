
site:
  title: 기록하기
email: fftl.0710@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
#  Write an awesome description for your new site here. You can edit this
#  line in _config.yml. It will appear in your document head meta (for
#  Google search results) and in your feed.xml site description.
baseurl:  # the subpath of your site, e.g. /blog
url: https://fftl.github.io # the base hostname & protocol for your site, e.g. http://example.com
twitter_username:
github_username:  fftl

# Build settings
theme: minima
plugins:
  - jekyll-feed

github:
    repo: https://github.com/fftl/fftl.github.io

google_fonts: Nanum+Gothic:wght@400;700;800

# Navigation (2nd level links supported)
# sidebar 관리하기
nav:
  Home:
    - '/blog/categories/'
  Categories:
    - '/blog/categories/'
  Tags:
    - '/blog/tags/'
  About:
    - '/about/'
  # Github Project:
    # - 'http://codinfox.github.io/'

sass:
  style: compressed
  sass_dir: _scss